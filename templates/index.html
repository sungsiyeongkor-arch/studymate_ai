<!DOCTYPE html>
<html lang="ko" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyMate AI — PDF 학습 보조 도구</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body>
  <div class="app">

    <!-- ── Topbar ───────────────────────────────────────────────────────────── -->
    <header class="topbar">
      <div class="topbar__brand">
        <span aria-hidden="true">📚</span>
        <span>StudyMate AI</span>
      </div>
      <div class="topbar__actions">
        <button id="themeToggle" class="icon-btn" title="다크모드 전환" aria-label="다크모드 전환">🌙</button>
        <button id="settingsToggle" class="icon-btn" title="설정" aria-label="설정 열기">⚙️</button>
      </div>
    </header>

    <!-- ── Settings panel ───────────────────────────────────────────────────── -->
    <aside class="settings-panel" id="settingsPanel" aria-label="설정 패널" role="dialog">
      <div class="settings-panel__header">
        <h2>설정</h2>
        <button id="settingsClose" class="icon-btn" aria-label="설정 닫기">✕</button>
      </div>
      <div class="settings-panel__body">

        <div class="setting-group">
          <span class="setting-label">출력 모드</span>
          <div class="mode-selector" role="radiogroup" aria-label="출력 모드 선택">
            <label class="mode-option">
              <input type="radio" name="mode" value="analyze" checked />
              <span>📝 요약 + 핵심 포인트</span>
            </label>
            <label class="mode-option">
              <input type="radio" name="mode" value="quiz" />
              <span>❓ 퀴즈 생성</span>
            </label>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="languageSel">출력 언어</label>
          <select id="languageSel">
            <option value="ko">🇰🇷 한국어</option>
            <option value="en">🇺🇸 English</option>
          </select>
        </div>

        <!-- Analysis-only settings -->
        <div id="analyzeSettings">
          <div class="setting-group">
            <label class="setting-label" for="numPoints">
              핵심 포인트 수: <strong id="numPointsDisplay">10</strong>개
            </label>
            <input type="range" id="numPoints" min="3" max="15" value="10" aria-valuemin="3" aria-valuemax="15" />
          </div>
          <div class="setting-group">
            <label class="setting-label" for="summarySentences">요약 길이</label>
            <select id="summarySentences">
              <option value="3">짧게 (3문장)</option>
              <option value="5" selected>보통 (5문장)</option>
              <option value="7">길게 (7문장)</option>
            </select>
          </div>
        </div>

        <!-- Quiz-only settings -->
        <div id="quizSettings" hidden>
          <div class="setting-group">
            <label class="setting-label" for="numQuestions">
              퀴즈 문제 수: <strong id="numQuestionsDisplay">5</strong>개
            </label>
            <input type="range" id="numQuestions" min="3" max="15" value="5" aria-valuemin="3" aria-valuemax="15" />
          </div>
        </div>

      </div>
    </aside>
    <div class="settings-overlay" id="settingsOverlay" hidden aria-hidden="true"></div>

    <!-- ── Main ─────────────────────────────────────────────────────────────── -->
    <main class="main">

      <div class="hero">
        <h1>PDF를 업로드하면 AI가 분석해 드립니다</h1>
        <p>요약 · 핵심 포인트 추출 · 퀴즈 생성을 지원합니다</p>
      </div>

      <!-- Upload section -->
      <section id="uploadSection" aria-label="파일 업로드">
        <form id="uploadForm" enctype="multipart/form-data" novalidate>
          <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-label="PDF 파일을 드래그하거나 클릭하여 업로드하세요">
            <div class="drop-zone__content">
              <div class="drop-zone__icon" aria-hidden="true">📄</div>
              <p>PDF 파일을 여기에 드래그하거나</p>
              <label class="btn btn--primary" for="fileInput">파일 선택</label>
              <input type="file" id="fileInput" name="file" accept=".pdf" class="sr-only" aria-label="PDF 파일 선택" />
            </div>
            <p class="drop-zone__hint" id="fileHint">최대 16 MB · PDF 형식만 지원</p>
          </div>

          <button type="submit" class="btn btn--analyze" id="analyzeBtn" disabled>
            <span class="btn__label">AI 분석 시작</span>
            <span class="btn__spinner" aria-hidden="true"></span>
          </button>
        </form>
      </section>

      <!-- Error banner -->
      <div class="error-banner" id="errorBanner" role="alert" aria-live="assertive" hidden>
        <span aria-hidden="true">⚠️</span>
        <span id="errorMessage"></span>
      </div>

      <!-- Results section -->
      <section id="resultsSection" hidden aria-label="분석 결과">

        <!-- Analysis results -->
        <div id="analysisResults" hidden>
          <div class="card">
            <div class="card__header">
              <span aria-hidden="true">📝</span>
              <h2 class="card__title">내용 요약</h2>
              <button class="copy-btn" data-target="summaryText" title="클립보드에 복사" aria-label="요약 복사">📋</button>
            </div>
            <p class="card__body" id="summaryText"></p>
          </div>

          <div class="card">
            <div class="card__header">
              <span aria-hidden="true">🎯</span>
              <h2 class="card__title">핵심 포인트</h2>
              <button class="copy-btn" data-target="keyPointsList" title="클립보드에 복사" aria-label="핵심 포인트 복사">📋</button>
            </div>
            <ul class="key-points-list" id="keyPointsList" aria-label="핵심 포인트 목록"></ul>
          </div>
        </div>

        <!-- Quiz results -->
        <div id="quizResults" hidden>
          <div id="quizContainer" aria-label="퀴즈 문제"></div>
          <div class="quiz-score card" id="quizScore" hidden aria-live="polite">
            <span aria-hidden="true">🏆</span>
            <p>최종 점수: <strong id="scoreDisplay"></strong></p>
          </div>
        </div>

        <div class="results-actions">
          <button class="btn btn--reset" id="resetBtn">다른 파일 분석하기</button>
        </div>
      </section>

    </main>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
